<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flashcards</title>
<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  margin:0;
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* FLOATING MENU BUTTON */
.menu-toggle{
  position:fixed;
  top:20px;
  left:20px;
  width:50px;
  height:50px;
  border:none;
  border-radius:50%;
  background:#5471c0;
  color:white;
  font-size:24px;
  cursor:pointer;
  z-index:1100;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.3s ease;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.menu-toggle.active{
  transform:scale(1.1);
  background:#405aa0;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-240px;
  width:240px;
  height:100%;
  background:rgba(255,255,255,0.95);
  box-shadow:2px 0 12px rgba(0,0,0,0.1);
  display:flex;
  flex-direction:column;
  padding:100px 20px 20px 20px;
  gap:10px;
  transition:left 0.5s ease, opacity 0.3s ease;
  opacity:0;
  z-index:1050;
}

.sidebar.open{
  left:0;
  opacity:1;
}

/* MENU BUTTONS */
.tab-btn{
  background:none;
  border:none;
  color:#444;
  text-align:left;
  padding:12px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  display:flex;
  align-items:center;
  opacity:0;
  transform:translateX(-20px);
  transition:all 0.3s ease;
}

.sidebar.open .tab-btn{
  opacity:1;
  transform:translateX(0);
}

.tab-btn:hover{
  background:#e4e9f7;
}

.tab-btn.active{
  background:#d6def7;
  font-weight:600;
}

/* MAIN */
.main{
  flex:1;
  padding:40px;
  overflow:auto;
  margin-left:0;
  margin-top:20px;
  transition:margin-left 0.5s ease, margin-top 0.3s ease;
}

.main.shifted{
  margin-left:240px;
  margin-top:60px;
}

/* TABS */
.tab{display:none;}
.tab.active{display:block;}

/* CONTAINER */
.container{
  background:white;
  padding:30px;
  border-radius:18px;
  box-shadow:0 12px 30px rgba(0,0,0,.15);
  max-width:750px;
  margin:auto;
}

/* FLASHCARD */
.flashcard{
  width:100%;
  height:260px;
  background:#f9f9f9;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.2);
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  perspective:1000px;
  margin:30px 0;
}

.flashcard-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .6s;
}

.flashcard.flipped .flashcard-inner{
  transform:rotateY(180deg);
}

.flashcard-front,
.flashcard-back{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:28px;
  padding:30px;
  box-sizing:border-box;
  backface-visibility:hidden;
}

.flashcard-back{
  transform:rotateY(180deg);
}

.flashcard.correct{border-left:7px solid #4caf50;}
.flashcard.incorrect{border-left:7px solid #f44336;}

/* BUTTONS */
.buttonRow{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  justify-content:center;
}

button{
  width:140px;
  height:44px;
  border:none;
  border-radius:12px;
  background:#5471c0;
  color:white;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-3px);
  background:#405aa0;
}

#toggleMode{
  width:auto;
  padding:0 18px;
  min-width:220px;
}

/* CLEAN TITLE FIX */
#knowledgeTitle{
  font-size:34px;
  text-align:center;
  margin-bottom:10px;
}

/* DESCRIPTION */
#knowledgeExplain{
  text-align:center;
  color:#555;
  margin-bottom:20px;
}

#termPrompt{
  font-size:22px;
  font-weight:bold;
  text-align:left;
  margin-bottom:10px;
}

textarea{
  width:100%;
  height:140px;
  font-size:18px;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

#submitBtn{
  margin-top:14px;
  width:100%;
  background:#764ba2;
}

.preview{
  height:240px;
  border:1px dashed #ccc;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#777;
  margin-top:20px;
}

/* PROGRESS */
#progress{
  text-align:center;
  margin-bottom:10px;
  font-size:15px;
  color:#555;
}

#scoreSummary{
  text-align:center;
  margin-bottom:10px;
  font-size:15px;
  color:#555;
}

#reviewIndicator{
  text-align:center;
  color:#c0392b;
  display:none;
  margin-bottom:10px;
  font-weight:bold;
}

#testScoreSummary{
  text-align:center;
  margin-bottom:10px;
  font-size:15px;
  color:#555;
}
</style>
</head>
<body>

<button class="menu-toggle" id="menuToggle">☰</button>

<div class="sidebar" id="sidebar">
  <button class="tab-btn active" onclick="openTab('study', this)">Flashcards</button>
  <button class="tab-btn" onclick="openTab('test', this)">Test Your Knowledge</button>
  <button class="tab-btn" onclick="openTab('print', this)">Print</button>
</div>

<div class="main" id="main">

  <div id="study" class="tab active">
    <div class="container">

      <div class="buttonRow" style="justify-content:flex-end;">
        <button id="toggleMode">Mode: Term → Definition</button>
      </div>

      <div id="reviewIndicator">Reviewing Incorrect Cards</div>
      <div id="progress"></div>
      <div id="scoreSummary"></div>

      <div class="flashcard" id="flashcard">
        <div class="flashcard-inner">
          <div class="flashcard-front" id="front">Loading...</div>
          <div class="flashcard-back" id="back"></div>
        </div>
      </div>

      <div class="buttonRow">
        <button id="prev">← Previous</button>
        <button id="incorrect">✖ Incorrect</button>
        <button id="correct">✔ Correct</button>
        <button id="next">Next →</button>
        <button id="review">⟳ Review Wrong</button>
        <button id="reset">↺ Restart</button>
      </div>

    </div>
  </div>

  <div id="test" class="tab">
    <div class="container">

      <div id="knowledgeTitle">Test Your Knowledge</div>
      <div id="knowledgeExplain">
        Explain the term in your own words and submit it for feedback.
      </div>

      <div id="testScoreSummary"></div>
      <div id="termPrompt"></div>
      <textarea id="explanationInput" placeholder="Write your explanation here..."></textarea>

      <div class="buttonRow" style="margin-top:14px;">
        <button id="prevTerm">← Previous Term</button>
        <button id="correctTest">✔ Correct</button>
        <button id="incorrectTest">✖ Incorrect</button>
        <button id="nextTerm">Next Term →</button>
        <button id="reviewTest">⟳ Review Wrong</button>
        <button id="resetTest">↺ Restart</button>
      </div>

      <button id="submitBtn">Submit</button>

      <div id="submitStatus" style="margin-top:10px;background:#f4f4f4;padding:12px;border-radius:10px;">
        Response will appear here.
      </div>

    </div>
  </div>

  <div id="print" class="tab">
    <div class="container">

      <div class="buttonRow">
        <button id="double">⇄ Double Sided</button>
        <button id="single">☰ One Sided</button>
        <button id="save">⬇ Save PDF</button>
      </div>

      <div class="preview" id="preview">
        Double-Sided Layout Preview
      </div>

    </div>
  </div>

</div>

<script>
/* MENU */
const menuToggle = document.getElementById("menuToggle");
const sidebar = document.getElementById("sidebar");
const main = document.getElementById("main");

menuToggle.onclick = () => {
  const open = !sidebar.classList.contains("open");
  sidebar.classList.toggle("open", open);
  main.classList.toggle("shifted", open);
  menuToggle.classList.toggle("active", open);
};

function openTab(tabId, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(tabId).classList.add("active");
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

/* FLASHCARDS */
const scriptURL = "https://script.google.com/macros/s/AKfycbxtsjs7YmA6X8i5dRQT2MbUGIx42uiP0AWvDfsYNkzYUqMfG9SjyPlcwiw-jyID797z/exec";
const params = new URLSearchParams(window.location.search);
const setId = params.get("set");

let allCards = [];
let cards = [];
let current = 0;
let showBackFirst = false;

let testCards = [];
let testCurrent = 0;

const frontEl = document.getElementById("front");
const backEl = document.getElementById("back");
const flashcard = document.getElementById("flashcard");
const progressEl = document.getElementById("progress");
const scoreSummaryEl = document.getElementById("scoreSummary");
const toggleModeBtn = document.getElementById("toggleMode");
const termPromptEl = document.getElementById("termPrompt");
const explanationInput = document.getElementById("explanationInput");
const submitBtn = document.getElementById("submitBtn");
const submitStatus = document.getElementById("submitStatus");
const testScoreSummaryEl = document.getElementById("testScoreSummary");

function updateModeButton() {
  toggleModeBtn.innerText = showBackFirst
    ? "Mode: Definition → Term"
    : "Mode: Term → Definition";
}

function updateScoreSummary() {
  const correctCount = cards.filter(c => c.status === "correct").length;
  const incorrectCount = cards.filter(c => c.status === "incorrect").length;
  scoreSummaryEl.innerText = `Correct: ${correctCount} | Incorrect: ${incorrectCount}`;
}

function updateTestScoreSummary() {
  const correctCount = testCards.filter(c => c.status === "correct").length;
  const incorrectCount = testCards.filter(c => c.status === "incorrect").length;
  testScoreSummaryEl.innerText = `Correct: ${correctCount} | Incorrect: ${incorrectCount}`;
}

async function loadCards() {
  frontEl.innerText = "Loading...";
  try {
    const url = setId
      ? `${scriptURL}?${new URLSearchParams({ set: setId }).toString()}`
      : scriptURL;

    const res = await fetch(url);
    const data = await res.json();

    allCards = Array.isArray(data) ? data : [];

    if (!allCards.length) {
      frontEl.innerText = "No flashcards found.";
      termPromptEl.textContent = "";
      progressEl.innerText = "";
      scoreSummaryEl.innerText = "";
      testScoreSummaryEl.innerText = "";
      return;
    }

    cards = allCards.map(c => ({ ...c, status: null }));
    testCards = allCards.map(c => ({ ...c, status: null }));
    current = 0;
    testCurrent = 0;
    showCard();
    showTestCard();
  } catch (err) {
    console.error(err);
    frontEl.innerText = "Error loading flashcards.";
    termPromptEl.textContent = "";
    progressEl.innerText = "";
    scoreSummaryEl.innerText = "";
    testScoreSummaryEl.innerText = "";
  }
}

function showCard() {
  if (!cards.length) return;

  const c = cards[current];
  flashcard.classList.remove("flipped", "correct", "incorrect");

  if (showBackFirst) {
    frontEl.innerText = c.back || c.def || "";
    backEl.innerText = c.front || c.term || "";
  } else {
    frontEl.innerText = c.front || c.term || "";
    backEl.innerText = c.back || c.def || "";
  }

  termPromptEl.textContent = c.front || c.term || "";
  progressEl.innerText = `Card ${current + 1} / ${cards.length}`;
  updateScoreSummary();
}

function showTestCard() {
  if (!testCards.length) return;
  const c = testCards[testCurrent];
  termPromptEl.textContent = c.front || c.term || "";
  updateTestScoreSummary();
}

async function saveExplanation() {
  if (!testCards.length) return;

  const c = testCards[testCurrent];
  const id = c.id || "";
  const term = c.front || c.term || "";
  const explanation = explanationInput.value.trim();

  if (!id) {
    submitStatus.innerText = "This card has no Id, so it cannot be saved.";
    return;
  }

  if (!term) {
    submitStatus.innerText = "This card has no term.";
    return;
  }

  if (!explanation) {
    submitStatus.innerText = "Please write an explanation first.";
    return;
  }

  submitStatus.innerText = "Saving...";

  try {
    const body = new URLSearchParams({
      action: "saveExplanation",
      Id: id,
      Term: term,
      Explanation: explanation
    });

    const res = await fetch(scriptURL, {
      method: "POST",
      body
    });

    const result = await res.json();
    submitStatus.innerText = result.success
      ? "Explanation saved to sheet."
      : (result.error || "Could not save explanation.");
  } catch (err) {
    console.error(err);
    submitStatus.innerText = "Error saving explanation.";
  }
}

/* STUDY TAB */
flashcard.onclick = () => flashcard.classList.toggle("flipped");

toggleModeBtn.onclick = () => {
  showBackFirst = !showBackFirst;
  updateModeButton();
  showCard();
};

document.getElementById("next").onclick = () => {
  if (!cards.length) return;
  current = (current + 1) % cards.length;
  showCard();
};

document.getElementById("prev").onclick = () => {
  if (!cards.length) return;
  current = (current - 1 + cards.length) % cards.length;
  showCard();
};

document.getElementById("correct").onclick = () => {
  if (!cards.length) return;
  cards[current].status = "correct";
  flashcard.classList.remove("incorrect");
  flashcard.classList.add("correct");
  updateScoreSummary();
};

document.getElementById("incorrect").onclick = () => {
  if (!cards.length) return;
  cards[current].status = "incorrect";
  flashcard.classList.remove("correct");
  flashcard.classList.add("incorrect");
  updateScoreSummary();
};

document.getElementById("review").onclick = () => {
  const wrong = cards.filter(c => c.status === "incorrect");
  if (!wrong.length) {
    alert("No incorrect cards to review!");
    return;
  }
  cards = wrong;
  current = 0;
  document.getElementById("reviewIndicator").style.display = "block";
  showCard();
};

document.getElementById("reset").onclick = () => {
  document.getElementById("reviewIndicator").style.display = "none";
  loadCards();
};

/* TEST TAB */
document.getElementById("nextTerm").onclick = () => {
  if (!testCards.length) return;
  testCurrent = (testCurrent + 1) % testCards.length;
  explanationInput.value = "";
  submitStatus.innerText = "Response will appear here.";
  showTestCard();
};

document.getElementById("prevTerm").onclick = () => {
  if (!testCards.length) return;
  testCurrent = (testCurrent - 1 + testCards.length) % testCards.length;
  explanationInput.value = "";
  submitStatus.innerText = "Response will appear here.";
  showTestCard();
};

document.getElementById("correctTest").onclick = () => {
  if (!testCards.length) return;
  testCards[testCurrent].status = "correct";
  updateTestScoreSummary();
};

document.getElementById("incorrectTest").onclick = () => {
  if (!testCards.length) return;
  testCards[testCurrent].status = "incorrect";
  updateTestScoreSummary();
};

document.getElementById("reviewTest").onclick = () => {
  const wrong = testCards.filter(c => c.status === "incorrect");
  if (!wrong.length) {
    alert("No incorrect cards to review!");
    return;
  }
  testCards = wrong;
  testCurrent = 0;
  submitStatus.innerText = "Response will appear here.";
  showTestCard();
};

document.getElementById("resetTest").onclick = () => {
  loadCards();
  explanationInput.value = "";
  submitStatus.innerText = "Response will appear here.";
  testCurrent = 0;
  testCards = allCards.map(c => ({ ...c, status: null }));
  updateTestScoreSummary();
};

/* SAVE */
submitBtn.onclick = saveExplanation;

/* START */
updateModeButton();
loadCards();
</script>

</body>
</html>
