<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flashcards</title>
<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  margin:0;
  display:flex;
  height:100vh;
  overflow:hidden;
}

.menu-toggle{
  position:fixed;
  top:20px;
  left:20px;
  width:50px;
  height:50px;
  border:none;
  border-radius:50%;
  background:#5471c0;
  color:white;
  font-size:24px;
  cursor:pointer;
  z-index:1100;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.3s ease;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.menu-toggle.active{
  transform:scale(1.1);
  background:#405aa0;
}

.sidebar{
  position:fixed;
  top:0;
  left:-240px;
  width:240px;
  height:100%;
  background:rgba(255,255,255,0.95);
  box-shadow:2px 0 12px rgba(0,0,0,0.1);
  display:flex;
  flex-direction:column;
  padding:100px 20px 20px 20px;
  gap:10px;
  transition:left 0.5s ease, opacity 0.3s ease;
  opacity:0;
  z-index:1050;
}

.sidebar.open{
  left:0;
  opacity:1;
}

.tab-btn{
  background:none;
  border:none;
  color:#444;
  text-align:left;
  padding:12px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  display:flex;
  align-items:center;
  opacity:0;
  transform:translateX(-20px);
  transition:all 0.3s ease;
}

.sidebar.open .tab-btn{
  opacity:1;
  transform:translateX(0);
}

.tab-btn:hover{
  background:#e4e9f7;
}

.tab-btn.active{
  background:#d6def7;
  font-weight:600;
}

.main{
  flex:1;
  padding:40px;
  overflow:auto;
  margin-left:0;
  margin-top:20px;
  transition:margin-left 0.5s ease, margin-top 0.3s ease;
}

.main.shifted{
  margin-left:240px;
  margin-top:60px;
}

.tab{display:none;}
.tab.active{display:block;}

.container{
  background:white;
  padding:30px;
  border-radius:18px;
  box-shadow:0 12px 30px rgba(0,0,0,.15);
  max-width:900px;
  margin:auto;
}

.flashcard{
  width:100%;
  height:260px;
  background:#f9f9f9;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.2);
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  perspective:1000px;
  margin:30px 0;
}

.flashcard-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .6s;
}

.flashcard.flipped .flashcard-inner{
  transform:rotateY(180deg);
}

.flashcard-front,
.flashcard-back{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:28px;
  padding:30px;
  box-sizing:border-box;
  backface-visibility:hidden;
}

.flashcard-back{
  transform:rotateY(180deg);
}

.flashcard.correct{border-left:7px solid #4caf50;}
.flashcard.incorrect{border-left:7px solid #f44336;}

.buttonRow{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  justify-content:center;
}

.button-break{
  flex-basis:100%;
  height:0;
}

button{
  width:140px;
  height:44px;
  border:none;
  border-radius:12px;
  background:#5471c0;
  color:white;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-3px);
  background:#405aa0;
}

#toggleMode{
  width:auto;
  padding:0 18px;
  min-width:220px;
}

#knowledgeTitle{
  font-size:34px;
  text-align:center;
  margin-bottom:10px;
}

#knowledgeExplain{
  text-align:center;
  color:#555;
  margin-bottom:20px;
}

#termPrompt{
  font-size:22px;
  font-weight:bold;
  text-align:left;
  margin-bottom:10px;
}

textarea{
  width:100%;
  height:140px;
  font-size:18px;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  border-left:7px solid #ddd;
  box-sizing:border-box;
  transition:border-color .2s ease, border-left-color .2s ease, background-color .2s ease;
}

textarea.correct{
  border-left:7px solid #4caf50;
}

textarea.incorrect{
  border-left:7px solid #f44336;
}

#submitBtn{
  margin-top:14px;
  width:100%;
  background:#764ba2;
}

.preview{
  min-height:300px;
  border:1px dashed #ccc;
  border-radius:10px;
  color:#444;
  margin-top:20px;
  padding:20px;
  background:#fafafa;
}

#progress,
#scoreSummary,
#testScoreSummary{
  text-align:center;
  margin-bottom:10px;
  font-size:15px;
  color:#555;
}

#reviewIndicator,
#testReviewIndicator{
  text-align:center;
  color:#c0392b;
  display:none;
  margin-bottom:10px;
  font-weight:bold;
}

.print-sheet{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.print-card{
  border:1px solid #bbb;
  border-radius:10px;
  background:white;
  overflow:hidden;
}

.print-card.fold{
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:180px;
}

.print-panel{
  padding:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:24px;
  line-height:1.4;
  min-height:180px;
}

.print-panel + .print-panel{
  border-left:2px dashed #bbb;
}

.print-label{
  font-size:13px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#777;
  margin-bottom:10px;
  font-weight:700;
}

.print-panel-inner{
  width:100%;
}

.print-page{
  background:white;
  border:1px solid #bbb;
  border-radius:10px;
  min-height:220px;
  padding:24px;
  margin-bottom:18px;
  page-break-after:always;
  break-after:page;
}

.print-page:last-child{
  page-break-after:auto;
  break-after:auto;
}

.print-page-title{
  text-align:center;
  font-size:14px;
  color:#777;
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-bottom:16px;
}

.print-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.print-grid-card{
  border:1px solid #bbb;
  border-radius:10px;
  min-height:160px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:18px;
  font-size:22px;
  line-height:1.35;
  background:white;
}

.print-selected{
  background:#d6def7 !important;
  color:#2f3f6b;
}

@media print{
  body{
    background:white;
    display:block;
    height:auto;
    overflow:visible;
  }

  .menu-toggle,
  .sidebar,
  #study,
  #test,
  #double,
  #single,
  #save{
    display:none !important;
  }

  .main{
    margin:0;
    padding:0;
    overflow:visible;
  }

  #print{
    display:block !important;
  }

  #print .container{
    box-shadow:none;
    border-radius:0;
    max-width:none;
    padding:0;
    margin:0;
  }

  #preview{
    border:none;
    padding:0;
    background:white;
  }

  .print-card,
  .print-page,
  .print-grid-card{
    box-shadow:none;
  }

  .print-page{
    border:none;
    border-radius:0;
    margin:0;
    min-height:auto;
  }

  .print-card.fold{
    page-break-inside:avoid;
    break-inside:avoid;
    border:none;
    border-radius:0;
  }

  .print-panel{
    min-height:260px;
    font-size:26px;
  }

  @page{
    size:auto;
    margin:0.5in;
  }
}
</style>
</head>
<body>

<button class="menu-toggle" id="menuToggle">☰</button>

<div class="sidebar" id="sidebar">
  <button class="tab-btn active" onclick="openTab('study', this)">Flashcards</button>
  <button class="tab-btn" onclick="openTab('test', this)">Test Your Knowledge</button>
  <button class="tab-btn" onclick="openTab('print', this)">Print</button>
</div>

<div class="main" id="main">

  <div id="study" class="tab active">
    <div class="container">
      <div class="buttonRow" style="justify-content:flex-end;">
        <button id="toggleMode">Mode: Term → Definition</button>
      </div>

      <div id="reviewIndicator">Reviewing Incorrect Cards</div>
      <div id="progress"></div>
      <div id="scoreSummary"></div>

      <div class="flashcard" id="flashcard">
        <div class="flashcard-inner">
          <div class="flashcard-front" id="front">Loading...</div>
          <div class="flashcard-back" id="back"></div>
        </div>
      </div>

      <div class="buttonRow">
        <button id="prev">← Previous</button>
        <button id="incorrect">✖ Incorrect</button>
        <button id="correct">✔ Correct</button>
        <button id="next">Next →</button>
        <div class="button-break"></div>
        <button id="reset">↺ Restart</button>
        <button id="review">⟳ Review Wrong</button>
      </div>
    </div>
  </div>

  <div id="test" class="tab">
    <div class="container">
      <div id="knowledgeTitle">Test Your Knowledge</div>
      <div id="knowledgeExplain">
        Explain the term in your own words and submit it for feedback.
      </div>

      <div id="testReviewIndicator">Reviewing Incorrect Cards</div>
      <div id="testScoreSummary"></div>
      <div id="termPrompt"></div>
      <textarea id="explanationInput" placeholder="Write your explanation here..."></textarea>

      <div class="buttonRow" style="margin-top:14px;">
        <button id="prevTerm">← Previous Term</button>
        <button id="incorrectTest">✖ Incorrect</button>
        <button id="correctTest">✔ Correct</button>
        <button id="nextTerm">Next Term →</button>
        <div class="button-break"></div>
        <button id="resetTest">↺ Restart</button>
        <button id="reviewTest">⟳ Review Wrong</button>
      </div>

      <button id="submitBtn">Submit</button>

      <div id="submitStatus" style="margin-top:10px;background:#f4f4f4;padding:12px;border-radius:10px;">
        Response will appear here.
      </div>
    </div>
  </div>

  <div id="print" class="tab">
    <div class="container">
      <div class="buttonRow">
        <button id="double">⇄ Double Sided</button>
        <button id="single">☰ One Sided</button>
        <button id="save">⬇ Save PDF</button>
      </div>

      <div id="preview" class="preview">
        Loading print preview...
      </div>
    </div>
  </div>

</div>

<script>
const menuToggle = document.getElementById("menuToggle");
const sidebar = document.getElementById("sidebar");
const main = document.getElementById("main");

menuToggle.onclick = () => {
  const open = !sidebar.classList.contains("open");
  sidebar.classList.toggle("open", open);
  main.classList.toggle("shifted", open);
  menuToggle.classList.toggle("active", open);
};

function openTab(tabId, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(tabId).classList.add("active");
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

const scriptURL = "https://script.google.com/macros/s/AKfycbxtsjs7YmA6X8i5dRQT2MbUGIx42uiP0AWvDfsYNkzYUqMfG9SjyPlcwiw-jyID797z/exec";
const params = new URLSearchParams(window.location.search);
const setId = params.get("set");

let allCards = [];
let cards = [];
let current = 0;
let showBackFirst = false;

let testCards = [];
let testCurrent = 0;

let printMode = "double";

const frontEl = document.getElementById("front");
const backEl = document.getElementById("back");
const flashcard = document.getElementById("flashcard");
const progressEl = document.getElementById("progress");
const scoreSummaryEl = document.getElementById("scoreSummary");
const toggleModeBtn = document.getElementById("toggleMode");
const termPromptEl = document.getElementById("termPrompt");
const explanationInput = document.getElementById("explanationInput");
const submitBtn = document.getElementById("submitBtn");
const submitStatus = document.getElementById("submitStatus");
const testScoreSummaryEl = document.getElementById("testScoreSummary");
const testReviewIndicator = document.getElementById("testReviewIndicator");
const previewEl = document.getElementById("preview");
const singleBtn = document.getElementById("single");
const doubleBtn = document.getElementById("double");
const saveBtn = document.getElementById("save");

function updateModeButton() {
  toggleModeBtn.innerText = showBackFirst
    ? "Mode: Definition → Term"
    : "Mode: Term → Definition";
}

function updateScoreSummary() {
  const correctCount = cards.filter(c => c.status === "correct").length;
  const incorrectCount = cards.filter(c => c.status === "incorrect").length;
  scoreSummaryEl.innerText = `Correct: ${correctCount} | Incorrect: ${incorrectCount}`;
}

function updateTestScoreSummary() {
  const correctCount = testCards.filter(c => c.status === "correct").length;
  const incorrectCount = testCards.filter(c => c.status === "incorrect").length;
  testScoreSummaryEl.innerText = `Correct: ${correctCount} | Incorrect: ${incorrectCount}`;
}

function setTextareaStatus(status) {
  explanationInput.classList.remove("correct", "incorrect");
  if (status === "correct") explanationInput.classList.add("correct");
  if (status === "incorrect") explanationInput.classList.add("incorrect");
}

function clearTestInputState() {
  explanationInput.value = "";
  submitStatus.innerText = "Response will appear here.";
  setTextareaStatus(null);
}

function escapeHtml(text) {
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function updatePrintButtons() {
  singleBtn.classList.toggle("print-selected", printMode === "single");
  doubleBtn.classList.toggle("print-selected", printMode === "double");
}

function renderSingleSidedPreview() {
  if (!allCards.length) {
    previewEl.innerHTML = "No flashcards found.";
    return;
  }

  previewEl.innerHTML = `
    <div class="print-sheet">
      ${allCards.map(card => `
        <div class="print-card fold">
          <div class="print-panel">
            <div class="print-panel-inner">
              <div class="print-label">Term</div>
              <div>${escapeHtml(card.front || card.term || "")}</div>
            </div>
          </div>
          <div class="print-panel">
            <div class="print-panel-inner">
              <div class="print-label">Definition</div>
              <div>${escapeHtml(card.back || card.def || "")}</div>
            </div>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

function renderDoubleSidedPreview() {
  if (!allCards.length) {
    previewEl.innerHTML = "No flashcards found.";
    return;
  }

  const fronts = allCards.map(card => `
    <div class="print-grid-card">${escapeHtml(card.front || card.term || "")}</div>
  `).join("");

  const backs = allCards.map(card => `
    <div class="print-grid-card">${escapeHtml(card.back || card.def || "")}</div>
  `).join("");

  previewEl.innerHTML = `
    <div class="print-page">
      <div class="print-page-title">Page 1 — Terms</div>
      <div class="print-grid">${fronts}</div>
    </div>
    <div class="print-page">
      <div class="print-page-title">Page 2 — Definitions</div>
      <div class="print-grid">${backs}</div>
    </div>
  `;
}

function renderPrintPreview() {
  updatePrintButtons();
  if (printMode === "single") {
    renderSingleSidedPreview();
  } else {
    renderDoubleSidedPreview();
  }
}

async function loadCards() {
  frontEl.innerText = "Loading...";
  try {
    const url = setId
      ? `${scriptURL}?${new URLSearchParams({ set: setId }).toString()}`
      : scriptURL;

    const res = await fetch(url);
    const data = await res.json();

    allCards = Array.isArray(data) ? data : [];

    if (!allCards.length) {
      frontEl.innerText = "No flashcards found.";
      termPromptEl.textContent = "";
      progressEl.innerText = "";
      scoreSummaryEl.innerText = "";
      testScoreSummaryEl.innerText = "";
      renderPrintPreview();
      return;
    }

    cards = allCards.map(c => ({ ...c, status: null }));
    testCards = allCards.map(c => ({ ...c, status: null }));
    current = 0;
    testCurrent = 0;

    document.getElementById("reviewIndicator").style.display = "none";
    testReviewIndicator.style.display = "none";

    showCard();
    showTestCard();
    clearTestInputState();
    renderPrintPreview();
  } catch (err) {
    console.error(err);
    frontEl.innerText = "Error loading flashcards.";
    termPromptEl.textContent = "";
    progressEl.innerText = "";
    scoreSummaryEl.innerText = "";
    testScoreSummaryEl.innerText = "";
    previewEl.innerHTML = "Error loading print preview.";
  }
}

function showCard() {
  if (!cards.length) return;

  const c = cards[current];
  flashcard.classList.remove("flipped", "correct", "incorrect");

  if (showBackFirst) {
    frontEl.innerText = c.back || c.def || "";
    backEl.innerText = c.front || c.term || "";
  } else {
    frontEl.innerText = c.front || c.term || "";
    backEl.innerText = c.back || c.def || "";
  }

  progressEl.innerText = `Card ${current + 1} / ${cards.length}`;
  updateScoreSummary();
}

function showTestCard() {
  if (!testCards.length) return;
  const c = testCards[testCurrent];
  termPromptEl.textContent = c.front || c.term || "";
  setTextareaStatus(c.status || null);
  updateTestScoreSummary();
}

async function saveExplanation() {
  if (!testCards.length) return;
  submitStatus.innerText = "Submit functionality is still not connected in this version.";
}

flashcard.onclick = () => flashcard.classList.toggle("flipped");

toggleModeBtn.onclick = () => {
  showBackFirst = !showBackFirst;
  updateModeButton();
  showCard();
};

document.getElementById("next").onclick = () => {
  if (!cards.length) return;
  current = (current + 1) % cards.length;
  showCard();
};

document.getElementById("prev").onclick = () => {
  if (!cards.length) return;
  current = (current - 1 + cards.length) % cards.length;
  showCard();
};

document.getElementById("correct").onclick = () => {
  if (!cards.length) return;
  cards[current].status = "correct";
  flashcard.classList.remove("incorrect");
  flashcard.classList.add("correct");
  updateScoreSummary();
};

document.getElementById("incorrect").onclick = () => {
  if (!cards.length) return;
  cards[current].status = "incorrect";
  flashcard.classList.remove("correct");
  flashcard.classList.add("incorrect");
  updateScoreSummary();
};

document.getElementById("review").onclick = () => {
  const wrong = cards.filter(c => c.status === "incorrect");
  if (!wrong.length) {
    alert("No incorrect cards to review!");
    return;
  }
  cards = wrong;
  current = 0;
  document.getElementById("reviewIndicator").style.display = "block";
  showCard();
};

document.getElementById("reset").onclick = () => {
  loadCards();
};

document.getElementById("nextTerm").onclick = () => {
  if (!testCards.length) return;
  testCurrent = (testCurrent + 1) % testCards.length;
  clearTestInputState();
  showTestCard();
};

document.getElementById("prevTerm").onclick = () => {
  if (!testCards.length) return;
  testCurrent = (testCurrent - 1 + testCards.length) % testCards.length;
  clearTestInputState();
  showTestCard();
};

document.getElementById("correctTest").onclick = () => {
  if (!testCards.length) return;
  testCards[testCurrent].status = "correct";
  setTextareaStatus("correct");
  updateTestScoreSummary();
};

document.getElementById("incorrectTest").onclick = () => {
  if (!testCards.length) return;
  testCards[testCurrent].status = "incorrect";
  setTextareaStatus("incorrect");
  updateTestScoreSummary();
};

document.getElementById("reviewTest").onclick = () => {
  const wrong = testCards.filter(c => c.status === "incorrect");
  if (!wrong.length) {
    alert("No incorrect cards to review!");
    return;
  }
  testCards = wrong;
  testCurrent = 0;
  testReviewIndicator.style.display = "block";
  clearTestInputState();
  showTestCard();
};

document.getElementById("resetTest").onclick = () => {
  testCards = allCards.map(c => ({ ...c, status: null }));
  testCurrent = 0;
  testReviewIndicator.style.display = "none";
  clearTestInputState();
  showTestCard();
};

singleBtn.onclick = () => {
  printMode = "single";
  renderPrintPreview();
};

doubleBtn.onclick = () => {
  printMode = "double";
  renderPrintPreview();
};

saveBtn.onclick = () => {
  renderPrintPreview();
  window.print();
};

submitBtn.onclick = saveExplanation;

updateModeButton();
updatePrintButtons();
loadCards();
</script>

</body>
</html>
