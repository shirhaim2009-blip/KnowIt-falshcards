<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Tag Submission</title>

<style>
body { 
    font-family: 'Segoe UI', sans-serif; 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
    margin: 0;
    display: flex;
}

/* 🔷 LEFT MENU */
.sidebar {
    width: 220px;
    padding: 20px;
    background: #ffffff22;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.menu-btn {
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: white;
    color: #333;
    font-weight: bold;
    cursor: pointer;
    text-align: left;
}

.menu-btn.active {
    background: #5471c0;
    color: white;
}

/* 🔷 MAIN AREA */
.main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🔷 PAGE SYSTEM */
.page {
    display: none;
    width: 100%;
    max-width: 500px;
}

.page.active {
    display: block;
}

/* 🔷 ORIGINAL STYLES (UNCHANGED) */
.container { 
    background: white; 
    padding: 2rem; 
    border-radius: 15px; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
    width: 100%; 
    box-sizing: border-box; 
}

h2 { 
    color: #333; 
    text-align: center; 
    margin-top: 0; 
}

textarea { 
    width: 100%; 
    height: 100px; 
    padding: 10px; 
    margin: 10px 0; 
    border: 1px solid #ddd; 
    border-radius: 8px; 
    box-sizing: border-box; 
    font-size: 16px; 
}

button { 
    width: 100%; 
    padding: 12px; 
    background-color: #5471c0; 
    color: white; 
    border: none; 
    border-radius: 8px; 
    cursor: pointer; 
    font-size: 16px; 
    font-weight: bold; 
}

button:hover { 
    opacity: 0.9; 
}

#status { 
    margin-top: 20px; 
    padding: 15px; 
    background: #f9f9f9; 
    border-left: 5px solid #5471c0; 
    border-radius: 4px; 
    display: none; 
    font-size: 14px; 
    color: #555; 
}

#copyBtn{
    display:none;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- 🔷 SIDEBAR -->
<div class="sidebar">
    <button class="menu-btn active" onclick="showPage('flashcards', this)">Flashcards</button>
    <button class="menu-btn" onclick="showPage('explain', this)">Explain</button>
    <button class="menu-btn" onclick="showPage('print', this)">Printing</button>
</div>

<!-- 🔷 MAIN -->
<div class="main">

    <!-- 🔷 FLASHCARDS TAB (YOUR ORIGINAL CODE) -->
    <div id="flashcards" class="page active">
        <div class="container">
            <h2>Create Your Flashcard Set:</h2>

            <form id="autoTagForm">
                <textarea name="UserInput" placeholder="What would you like to learn today?" required></textarea>
                <input type="hidden" name="Tag" id="hiddenTagField">
                <button type="submit">Make It</button>
            </form>

            <div id="status">Sending...</div>
            <button id="copyBtn">Copy Flashcard Link</button>
        </div>
    </div>

    <!-- 🔷 EXPLAIN TAB -->
    <div id="explain" class="page">
        <div class="container">
            <h2>Explain in Your Own Words</h2>

            <textarea id="explainInput" placeholder="Enter a concept..."></textarea>
            <button onclick="generateExplanation()">Explain</button>

            <div id="explainOutput" style="margin-top:15px;"></div>
        </div>
    </div>

    <!-- 🔷 PRINT TAB -->
    <div id="print" class="page">
        <div class="container">
            <h2>Print Flashcards</h2>

            <p>Click below to print your flashcards.</p>
            <button onclick="window.print()">Print</button>
        </div>
    </div>

</div>

<script>

// 🔷 TAB SWITCHING
function showPage(pageId, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');

    document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

// 🔷 ORIGINAL FLASHCARD LOGIC (UNCHANGED)
const form = document.getElementById('autoTagForm');
const statusDiv = document.getElementById('status');
const tagField = document.getElementById('hiddenTagField');
const copyBtn = document.getElementById('copyBtn');

const resultLink = "https://shirhaim2009-blip.github.io/KnowIt-falshcards/";

const scriptURL = 'https://script.google.com/macros/s/AKfycbzBNCrkSH4B3HFu30eWIzbbWjyVLYVTSox5M7NdxGYE6Qr95jfrQ6tmnVGQd3QofgA1/exec';

form.addEventListener('submit', e => {

    e.preventDefault();

    copyBtn.innerText = "Copy Flashcard Link";
    copyBtn.style.display = "none";

    const uniqueId = 'ID-' + Date.now();
    tagField.value = uniqueId;

    statusDiv.style.display = 'block';
    statusDiv.innerText = 'Connecting to OpenAI... Please stay on this page.';

    fetch(scriptURL, { 
        method: 'POST', 
        mode: 'no-cors', 
        body: new FormData(form)
    })
    .then(() => {

        statusDiv.innerText = "Success! Your flashcard set is ready! Copy the link.";
        copyBtn.style.display = "block";
        form.reset();

    })
    .catch(err => {

        statusDiv.innerText = 'Error! Check your internet or Script URL.';
        console.error(err);

    });

});

copyBtn.addEventListener("click", copyLink);

function copyLink(){

    const tempInput = document.createElement("textarea");
    tempInput.value = resultLink;

    document.body.appendChild(tempInput);
    tempInput.select();
    document.execCommand("copy");
    document.body.removeChild(tempInput);

    copyBtn.innerText = "Link Copied!";
}

// 🔷 EXPLAIN (simple placeholder)
function generateExplanation() {
    const input = document.getElementById("explainInput").value;
    const output = document.getElementById("explainOutput");

    if (!input) {
        output.innerText = "Please enter something.";
        return;
    }

    output.innerText = "In simple terms: " + input + " explained clearly.";
}

</script>

</body>
</html>
