<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flashcards</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
display:flex;
height:100vh;
}

/* LAYOUT */

.sidebar{
width:220px;
background:#2f3e75;
color:white;
display:flex;
flex-direction:column;
padding:20px;
gap:15px;
}

.sidebar h2{
margin:0 0 10px 0;
font-size:20px;
}

.tab-btn{
background:none;
border:none;
color:white;
text-align:left;
padding:12px;
border-radius:10px;
cursor:pointer;
font-size:15px;
}

.tab-btn:hover, .tab-btn.active{
background:#4459a8;
}

.main{
flex:1;
padding:40px;
overflow:auto;
}

.tab{
display:none;
}

.tab.active{
display:block;
}

/* CONTAINERS */

.container{
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 12px 30px rgba(0,0,0,.25);
max-width:750px;
margin:auto;
}

/* FLASHCARD */

.flashcard{
width:100%;
height:260px;
background:#f9f9f9;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
perspective:1000px;
margin:30px 0;
}

.flashcard-inner{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform .6s;
}

.flashcard.flipped .flashcard-inner{
transform:rotateY(180deg);
}

.flashcard-front,
.flashcard-back{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-size:28px;
padding:30px;
box-sizing:border-box;
backface-visibility:hidden;
}

.flashcard-back{
transform:rotateY(180deg);
}

.flashcard.correct{border-left:7px solid #4caf50;}
.flashcard.incorrect{border-left:7px solid #f44336;}

/* BUTTONS */

.buttonRow{
display:flex;
flex-wrap:wrap;
gap:14px;
justify-content:center;
}

button{
width:140px;
height:44px;
border:none;
border-radius:12px;
background:#5471c0;
color:white;
font-weight:600;
font-size:15px;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:translateY(-3px);
background:#405aa0;
}

#toggleMode{
width:auto;
padding:0 18px;
min-width:200px;
}

/* TEXT */

#knowledgeTitle{
font-size:30px;
text-align:center;
margin-bottom:6px;
}

#knowledgeExplain{
text-align:center;
color:#555;
margin-bottom:20px;
}

#termPrompt{
font-size:22px;
font-weight:bold;
text-align:left;
margin-bottom:10px;
}

textarea{
width:100%;
height:140px;
font-size:18px;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
}

#submitBtn{
margin-top:14px;
width:100%;
background:#764ba2;
}

.preview{
height:240px;
border:1px dashed #ccc;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
color:#777;
margin-top:20px;
}

#progress{
text-align:center;
margin-bottom:10px;
}

#reviewIndicator{
text-align:center;
color:#c0392b;
display:none;
margin-bottom:10px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Menu</h2>
<button class="tab-btn active" onclick="openTab('study')">📚 Study</button>
<button class="tab-btn" onclick="openTab('test')">🧠 Test</button>
<button class="tab-btn" onclick="openTab('print')">🖨 Print</button>
</div>

<!-- MAIN CONTENT -->
<div class="main">

<!-- STUDY TAB -->
<div id="study" class="tab active">
<div class="container">

<div class="buttonRow" style="justify-content:flex-end;">
<button id="toggleMode">Mode: Term → Definition</button>
</div>

<div id="reviewIndicator">Reviewing Incorrect Cards</div>
<div id="progress"></div>

<div class="flashcard" id="flashcard">
<div class="flashcard-inner">
<div class="flashcard-front" id="front"></div>
<div class="flashcard-back" id="back"></div>
</div>
</div>

<div class="buttonRow">
<button id="prev">← Prev</button>
<button id="incorrect">✖</button>
<button id="correct">✔</button>
<button id="next">Next →</button>
<button id="review">Review</button>
<button id="reset">Reset</button>
</div>

</div>
</div>

<!-- TEST TAB -->
<div id="test" class="tab">
<div class="container">

<div id="knowledgeTitle">Test Your Knowledge</div>
<div id="knowledgeExplain">
Explain the term in your own words and submit it for feedback.
</div>

<div id="termPrompt"></div>

<textarea placeholder="Write your explanation here..."></textarea>

<div class="buttonRow" style="margin-top:14px;">
<button id="prevTerm">← Prev</button>
<button id="nextTerm">Next →</button>
</div>

<button id="submitBtn">Submit</button>

<div style="margin-top:10px;background:#f4f4f4;padding:12px;border-radius:10px;">
Response will appear here.
</div>

</div>
</div>

<!-- PRINT TAB -->
<div id="print" class="tab">
<div class="container">

<div class="buttonRow">
<button id="double">Double Sided</button>
<button id="single">One Sided</button>
<button id="save">Save PDF</button>
</div>

<div class="preview" id="preview">
Double-Sided Layout Preview
</div>

</div>
</div>

</div>

<script>

/* TAB SWITCHING */

function openTab(tabId){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(tabId).classList.add("active");

document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
}

/* FLASHCARD DATA */

let cards=[
{term:"Lusitania",def:"British ship sunk in WWI",status:null},
{term:"Zimmermann Note",def:"Germany asked Mexico to fight US",status:null},
{term:"Treaty of Versailles",def:"Ended WWI",status:null}
];

let current=0;
let studyMode="term";
let reviewMode=false;

/* FUNCTIONS */

const front=document.getElementById("front");
const back=document.getElementById("back");
const flashcard=document.getElementById("flashcard");

function show(){
let c=cards[current];

front.innerText = (studyMode==="term") ? c.term : c.def;
back.innerText = (studyMode==="term") ? c.def : c.term;

flashcard.classList.remove("flipped","correct","incorrect");
if(c.status==="correct") flashcard.classList.add("correct");
if(c.status==="incorrect") flashcard.classList.add("incorrect");

document.getElementById("termPrompt").innerText = c.term;

document.getElementById("progress").innerText =
`Card ${current+1}/${cards.length}`;
}

flashcard.onclick=()=>flashcard.classList.toggle("flipped");

document.getElementById("next").onclick=()=>{current=(current+1)%cards.length;show();}
document.getElementById("prev").onclick=()=>{current=(current-1+cards.length)%cards.length;show();}

document.getElementById("correct").onclick=()=>{cards[current].status="correct";show();}
document.getElementById("incorrect").onclick=()=>{cards[current].status="incorrect";show();}

document.getElementById("reset").onclick=()=>{
cards.forEach(c=>c.status=null);
show();
};

document.getElementById("toggleMode").onclick=()=>{
studyMode = studyMode==="term"?"def":"term";
document.getElementById("toggleMode").innerText =
studyMode==="term"?"Mode: Term → Definition":"Mode: Definition → Term";
show();
};

/* TEST NAV */

let k=0;
document.getElementById("nextTerm").onclick=()=>{k=(k+1)%cards.length;document.getElementById("termPrompt").innerText=cards[k].term;}
document.getElementById("prevTerm").onclick=()=>{k=(k-1+cards.length)%cards.length;document.getElementById("termPrompt").innerText=cards[k].term;}

/* PRINT PREVIEW */

document.getElementById("double").onclick=()=>{preview.innerText="Double-Sided Layout";}
document.getElementById("single").onclick=()=>{preview.innerText="One-Sided Layout";}
document.getElementById("save").onclick=()=>alert("PDF coming soon");

show();

</script>

</body>
</html>
