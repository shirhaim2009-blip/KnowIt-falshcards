<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Study</title>

<style>
body { 
    font-family: 'Segoe UI', sans-serif; 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    justify-content: center;
    padding: 50px 20px;
    margin:0;
}

.page-wrapper{
    max-width:750px;
    width:100%;
    display:flex;
    flex-direction:column;
    gap:50px;
}

.container{
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 12px 30px rgba(0,0,0,.25);
}

/* Flashcard */

.flashcard-container{
    display:flex;
    justify-content:center;
    margin-bottom:30px;
}

.flashcard{
    width:100%;
    height:230px;
    border-radius:14px;
    background:#f9f9f9;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:26px;
    cursor:pointer;
    perspective:1000px;
}

.flashcard-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .6s ease;
}

.flashcard.flipped .flashcard-inner{
    transform:rotateY(180deg);
}

.flashcard-front,
.flashcard-back{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    backface-visibility:hidden;
}

.flashcard-back{
    transform:rotateY(180deg);
}

/* Buttons */

.button-row{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:14px;
}

button{
    width:130px;
    height:42px;
    border:none;
    border-radius:12px;
    background:#5471c0;
    color:white;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-3px);
    background:#405aa0;
}

/* Knowledge section */

#knowledgeTitle{
    text-align:center;
    font-size:28px;
    margin-top:-5px;
    margin-bottom:6px;
}

#featureExplanation{
    text-align:center;
    color:#555;
    margin-bottom:18px;
}

textarea{
    width:100%;
    margin-top:12px;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
}

#submitInputBtn{
    width:100%;
    margin-top:12px;
    background:#764ba2;
}

#responseArea{
    margin-top:12px;
    padding:12px;
    background:#f4f4f4;
    border-radius:10px;
}

/* PDF preview section */

.previewBox{
    margin-top:30px;
    border-top:1px solid #eee;
    padding-top:25px;
}

.previewButtons{
    display:flex;
    justify-content:center;
    gap:14px;
    margin-bottom:20px;
}

.pdfPreview{
    background:#fafafa;
    border:1px dashed #ccc;
    border-radius:10px;
    height:250px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:18px;
    color:#777;
}
</style>
</head>
<body>

<div class="page-wrapper">

<!-- Flashcards -->
<div class="container">

<div class="flashcard-container">
<div class="flashcard" id="flashcard">
<div class="flashcard-inner">

<div class="flashcard-front" id="cardFront">
Lusitania
</div>

<div class="flashcard-back" id="cardBack">
British ship sunk by German U-boat
</div>

</div>
</div>
</div>

<div class="button-row">
<button id="prevBtn">Previous</button>
<button id="incorrectBtn">Incorrect</button>
<button id="correctBtn">Correct</button>
<button id="nextBtn">Next</button>
<button id="reviewWrongBtn">Review Wrong</button>
<button id="resetBtn">Reset</button>
</div>

</div>


<!-- Test Knowledge -->
<div class="container">

<div id="knowledgeTitle">Test Your Knowledge</div>
<div id="featureExplanation">
Write your explanation of the term and submit it for feedback.
</div>

<div class="button-row">
<button id="inputPrevBtn">Prev Term</button>
<button id="inputNextBtn">Next Term</button>
</div>

<div id="currentTerm" style="text-align:center;font-size:22px;margin-top:15px;font-weight:bold;">
Lusitania
</div>

<textarea id="userInput" placeholder="Type your answer here..."></textarea>

<button id="submitInputBtn">Submit</button>

<div id="responseArea">
Response from OpenAI will appear here.
</div>


<!-- PDF Generator -->
<div class="previewBox">

<div class="previewButtons">
<button id="doubleBtn">Double Sided</button>
<button id="singleBtn">One Sided</button>
<button id="savePdfBtn">Save PDF</button>
</div>

<div class="pdfPreview" id="pdfPreview">
Double-Sided Layout Preview
</div>

</div>

</div>
</div>

<script>

let flashcards=[
{term:"Lusitania",definition:"British ship sunk by German U-boat"},
{term:"Zimmermann Note",definition:"German telegram to Mexico"},
{term:"Treaty of Versailles",definition:"Ended World War I"}
];

let current=0;

const flashcardDiv=document.getElementById("flashcard");
const cardFront=document.getElementById("cardFront");
const cardBack=document.getElementById("cardBack");

function showCard(){
cardFront.innerText=flashcards[current].term;
cardBack.innerText=flashcards[current].definition;
document.getElementById("currentTerm").innerText=flashcards[current].term;
flashcardDiv.classList.remove("flipped");
}

flashcardDiv.onclick=()=>flashcardDiv.classList.toggle("flipped");

document.getElementById("nextBtn").onclick=()=>{
current=(current+1)%flashcards.length;
showCard();
};

document.getElementById("prevBtn").onclick=()=>{
current=(current-1+flashcards.length)%flashcards.length;
showCard();
};

/* Preview switching */

const preview=document.getElementById("pdfPreview");

document.getElementById("doubleBtn").onclick=()=>{
preview.innerText="Double-Sided Layout Preview";
};

document.getElementById("singleBtn").onclick=()=>{
preview.innerText="One-Sided Layout Preview";
};

document.getElementById("savePdfBtn").onclick=()=>{
alert("PDF export will be added next.");
};

showCard();

</script>
</body>
</html>
