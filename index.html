<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6fa;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 400px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

#front {
    font-size: 22px;
    font-weight: bold;
}

#back {
    margin-top: 15px;
    color: #555;
}

/* Buttons */
.buttons {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #5471c0;
    color: white;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

#counter {
    margin-top: 10px;
    font-size: 14px;
    color: #777;
}
</style>
</head>

<body>

<div class="card">

    <div id="front">Loading...</div>
    <div id="back"></div>

    <div id="counter"></div>

    <div class="buttons">
        <button onclick="prevCard()">⬅ Prev</button>
        <button onclick="nextCard()">Next ➡</button>
        <button onclick="markCorrect()">✔ Correct</button>
        <button onclick="markWrong()">✖ Wrong</button>
        <button onclick="restart()">Restart 🔄</button>
    </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const setId = params.get("set");

let cards = [];
let current = 0;
let correct = 0;
let wrong = 0;

async function loadCards() {
    const res = await fetch("https://script.google.com/macros/s/AKfycbwwWbTURuUITfceDVqvfCTu4oBTjMQR1LjVhMEMQ4eJ_CBGq0LKkC8AOvgA4lmuDArE/exec");
    const data = await res.json();

    cards = data.filter(card => card.tag === setId);

    if (cards.length === 0) {
        alert("No flashcards found.");
        return;
    }

// 🔥 LOAD FROM GOOGLE SHEETS
async function loadCards() {

    if (!setId) {
        document.getElementById("front").innerText = "No set in URL.";
        return;
    }

    try {
        const res = await fetch("https://script.google.com/macros/s/AKfycbx7Mt6VI0htpVEWyPxtB99ESZmOYftSwOAuAFRp8Rs5K2rIJgkgN1sAYYQ9PawotbKi/exec");
        const data = await res.json();

        cards = data.filter(item => item.tag === setId);

        if (cards.length === 0) {
            document.getElementById("front").innerText = "No flashcards found.";
            return;
        }

        showCard();

    } catch (err) {
        console.error(err);
        document.getElementById("front").innerText = "Error loading data.";
    }
}

// 🔥 SHOW CARD
function showCard() {
    const card = cards[current];

    document.getElementById("front").innerText = card.front;
    document.getElementById("back").innerText = card.back;

    updateCounter();
}

// 🔥 CONTROLS
function nextCard() {
    if (current < cards.length - 1) {
        current++;
        showCard();
    }
}

function prevCard() {
    if (current > 0) {
        current--;
        showCard();
    }
}

function markCorrect() {
    correct++;
    nextCard();
}

function markWrong() {
    wrong++;
    nextCard();
}

function restart() {
    current = 0;
    correct = 0;
    wrong = 0;
    showCard();
}

// 🔥 COUNTER
function updateCounter() {
    document.getElementById("counter").innerText =
        `Card ${current + 1} / ${cards.length} | ✔ ${correct} ✖ ${wrong}`;
}

// 🔥 START
loadCards();

</script>

</body>
</html>
