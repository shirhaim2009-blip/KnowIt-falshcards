<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KnowIt Study Tool</title>

<style>
body { 
    font-family: 'Segoe UI', sans-serif; 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    margin: 0;
    display: flex;
}

/* 🔷 SIDEBAR */
.sidebar {
    width: 220px;
    background: #ffffff22;
    backdrop-filter: blur(10px);
    height: 100vh;
    padding: 20px;
    box-sizing: border-box;
}

.menu-btn {
    width: 100%;
    margin-bottom: 10px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: white;
    font-weight: bold;
    cursor: pointer;
}

.menu-btn.active {
    background: #5471c0;
    color: white;
}

/* 🔷 MAIN AREA */
.main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🔷 PAGE SYSTEM */
.page {
    display: none;
}

.page.active {
    display: block;
}

/* 🔷 ORIGINAL CARD STYLE */
.container { 
    background: white; 
    padding: 2rem; 
    border-radius: 15px; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
    width: 100%; 
    max-width: 500px; 
}

h2 { 
    text-align: center;
    margin-top: 0;
}

textarea { 
    width: 100%; 
    height: 100px; 
    padding: 10px; 
    margin: 10px 0; 
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 16px;
}

button { 
    width: 100%; 
    padding: 12px; 
    background-color: #5471c0; 
    color: white; 
    border: none; 
    border-radius: 8px; 
    cursor: pointer; 
    font-size: 16px; 
    font-weight: bold; 
}

button:hover { 
    opacity: 0.9; 
}

#status { 
    margin-top: 15px; 
    padding: 10px; 
    background: #f9f9f9; 
    border-left: 5px solid #5471c0; 
    border-radius: 4px; 
    display: none; 
}

#copyBtn {
    display: none;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- 🔷 SIDEBAR -->
<div class="sidebar">
    <button class="menu-btn active" onclick="showPage('flashcards', this)">Flashcards</button>
    <button class="menu-btn" onclick="showPage('explain', this)">Explain</button>
    <button class="menu-btn" onclick="showPage('print', this)">Printing</button>
</div>

<!-- 🔷 MAIN CONTENT -->
<div class="main">

    <!-- FLASHCARDS -->
    <div id="flashcards" class="page active">
        <div class="container">
            <h2>Create Your Flashcard Set</h2>

            <form id="autoTagForm">
                <textarea name="UserInput" placeholder="What would you like to learn today?" required></textarea>
                <button type="submit">Make It</button>
            </form>

            <div id="status">Sending...</div>
            <button id="copyBtn">Copy Flashcard Link</button>
        </div>
    </div>

    <!-- EXPLAIN -->
    <div id="explain" class="page">
        <div class="container">
            <h2>Explain in Your Own Words</h2>

            <textarea id="explainInput" placeholder="Enter a concept..."></textarea>
            <button onclick="generateExplanation()">Explain</button>

            <div id="explainOutput" style="margin-top:15px;"></div>
        </div>
    </div>

    <!-- PRINT -->
    <div id="print" class="page">
        <div class="container">
            <h2>Print Flashcards</h2>

            <p>Click below to print your flashcards.</p>
            <button onclick="window.print()">Print</button>
        </div>
    </div>

</div>

<script>

// 🔷 SIDEBAR NAVIGATION
function showPage(pageId, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');

    document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

// 🔷 FLASHCARD LOGIC (your original)
const form = document.getElementById('autoTagForm');
const statusDiv = document.getElementById('status');
const copyBtn = document.getElementById('copyBtn');

const resultLink = "https://shirhaim2009-blip.github.io/KnowIt-falshcards/";

form.addEventListener('submit', e => {

    e.preventDefault();

    copyBtn.style.display = "none";

    statusDiv.style.display = 'block';
    statusDiv.innerText = 'Generating flashcards...';

    setTimeout(() => {
        statusDiv.innerText = "Success! Copy your link.";
        copyBtn.style.display = "block";
    }, 1500);

});

copyBtn.addEventListener("click", () => {
    navigator.clipboard.writeText(resultLink);
    copyBtn.innerText = "Copied!";
});

// 🔷 EXPLAIN
function generateExplanation() {
    const input = document.getElementById("explainInput").value;
    const output = document.getElementById("explainOutput");

    if (!input) {
        output.innerText = "Please enter something.";
        return;
    }

    output.innerText = "In simple terms: " + input + " means explaining it clearly and simply.";
}

</script>

</body>
</html>
