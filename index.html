<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6fa;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 400px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

#front {
    font-size: 22px;
    font-weight: bold;
}

#back {
    margin-top: 15px;
    color: #555;
}

/* Buttons */
.buttons {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #5471c0;
    color: white;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

#counter {
    margin-top: 10px;
    font-size: 14px;
    color: #777;
}
</style>
</head>

<body>

<div class="card">

    <div id="front">Loading...</div>
    <div id="back"></div>

    <div id="counter"></div>

    <div class="buttons">
        <button onclick="prevCard()">⬅ Prev</button>
        <button onclick="nextCard()">Next ➡</button>
        <button onclick="markCorrect()">✔ Correct</button>
        <button onclick="markWrong()">✖ Wrong</button>
        <button onclick="restart()">Restart ↺</button>
    </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const setId = params.get("set");

const scriptURL = "https://script.google.com/macros/s/AKfycbwwWbTURuUITfceDVqvfCTu4oBTjMQR1LjVhMEMQ4eJ_CBGq0LKkC8AOvgA4lmuDArE/exec";

let cards = [];
let current = 0;

// 🟡 show loading
document.body.innerHTML = "<h2 style='text-align:center'>Loading flashcards...</h2>";

if (!setId) {
    document.body.innerHTML = "<h2>No set ID found.</h2>";
} else {

    fetch(`${scriptURL}?set=${setId}`)
        .then(res => res.json())
        .then(data => {

            console.log("DATA:", data);

            if (!data || data.length === 0) {
                document.body.innerHTML = "<h2>No flashcards found.</h2>";
                return;
            }

            cards = data;

            showCard();

        })
        .catch(err => {
            console.error(err);
            document.body.innerHTML = "<h2>Error loading flashcards.</h2>";
        });
}


// 🔥 SIMPLE CARD DISPLAY
function showCard() {
    const card = cards[current];

    document.body.innerHTML = `
        <div style="text-align:center; margin-top:100px; font-family:sans-serif;">
            <h2>Flashcard ${current + 1} / ${cards.length}</h2>

            <div onclick="flipCard()" id="card"
                style="
                margin:30px auto;
                width:300px;
                height:200px;
                background:white;
                border-radius:12px;
                display:flex;
                align-items:center;
                justify-content:center;
                font-size:20px;
                cursor:pointer;
                box-shadow:0 10px 25px rgba(0,0,0,0.2);
                ">
                ${card.front}
            </div>

            <button onclick="prev()">⬅️ Prev</button>
            <button onclick="next()">Next ➡️</button>
        </div>
    `;
}

let flipped = false;

function flipCard(){
    const card = document.getElementById("card");
    flipped = !flipped;

    card.innerText = flipped ? cards[current].back : cards[current].front;
}

function next(){
    if(current < cards.length - 1){
        current++;
        flipped = false;
        showCard();
    }
}

function prev(){
    if(current > 0){
        current--;
        flipped = false;
        showCard();
    }
}

</script>

</body>
</html>
