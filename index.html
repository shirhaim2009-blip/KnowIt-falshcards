<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Study</title>

<style>
body { 
    font-family: 'Segoe UI', sans-serif; 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
    display: flex; 
    justify-content: center; 
    align-items: flex-start; 
    padding: 40px 20px;
    min-height: 100vh; 
    margin: 0; 
    box-sizing: border-box;
}

.page-wrapper { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 40px; 
    width: 100%; 
    max-width: 700px; 
}

h2 {
    color: #333; /* titles now readable */
    text-align: center;
    margin: 0;
}

.container { 
    background: white; 
    padding: 2rem; 
    border-radius: 15px; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
    width: 100%; 
    box-sizing: border-box; 
}

.flashcard {
    background: #f9f9f9;
    width: 250px; /* square */
    height: 250px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    text-align: center;
    font-size: 24px;
    cursor: pointer;
    user-select: none;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1000px; /* for 3D flip */
    margin-bottom: 20px; /* spacing from buttons */
}

.flashcard-inner {
    width: 100%;
    height: 100%;
    text-align: center;
    transition: transform 0.6s;
    transform-style: preserve-3d;
    position: relative;
}

.flashcard.flipped .flashcard-inner {
    transform: rotateY(180deg);
}

.flashcard-front, .flashcard-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 12px;
}

.flashcard-back {
    transform: rotateY(180deg);
}

.flashcard.correct { border-left: 6px solid #4caf50; }
.flashcard.incorrect { border-left: 6px solid #f44336; }

.button-row {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
    flex-wrap: wrap;
    gap: 10px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background-color: #5471c0;
    color: white;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
}

button:hover { opacity: 0.9; }

textarea {
    width: 100%;
    height: 80px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 16px;
    box-sizing: border-box;
    margin-top: 10px;
}

#responseArea {
    margin-top: 10px;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    min-height: 60px;
    background: #f4f4f4;
}
</style>
</head>
<body>

<div class="page-wrapper">

    <!-- Flashcard Viewer -->
    <div class="container">
        <h2>Flashcards</h2>
        <div class="flashcard" id="flashcard">
            <div class="flashcard-inner">
                <div class="flashcard-front" id="cardFront">Click to flip</div>
                <div class="flashcard-back" id="cardBack">Definition</div>
            </div>
        </div>
        <div class="button-row">
            <button id="prevBtn">← Previous</button>
            <button id="correctBtn">✔ Correct</button>
            <button id="incorrectBtn">✖ Incorrect</button>
            <button id="nextBtn">Next →</button>
            <button id="reviewWrongBtn">Review Wrong</button>
            <button id="resetBtn">Reset Set</button>
        </div>
    </div>

    <!-- Term Input Section -->
    <div class="container">
        <h2>Submit Your Answer</h2>
        <div class="button-row">
            <button id="inputPrevBtn">← Previous Term</button>
            <button id="inputNextBtn">Next Term →</button>
        </div>
        <div id="currentTerm" style="font-weight:bold; font-size:20px; margin-top:10px;">Term appears here</div>
        <textarea id="userInput" placeholder="Type your answer here..."></textarea>
        <button id="submitInputBtn">Submit Answer</button>
        <div id="responseArea">Response from OpenAI will appear here.</div>
    </div>

</div>

<script>
// Flashcards data
let flashcards = [
    {term: "Lusitania", definition: "British ship sunk by German U-boat"},
    {term: "Zimmermann Note", definition: "German telegram to Mexico"},
    {term: "Treaty of Versailles", definition: "Ended World War I"}
];

let current = 0;
let flipped = false;
let correctIndexes = [];
let incorrectIndexes = [];
let reviewWrongOnly = false;

const flashcardDiv = document.getElementById("flashcard");
const cardFront = document.getElementById("cardFront");
const cardBack = document.getElementById("cardBack");
const currentTermDiv = document.getElementById("currentTerm");

// Show card
function showCard() {
    cardFront.innerText = flashcards[current].term;
    cardBack.innerText = flashcards[current].definition;
    currentTermDiv.innerText = flashcards[current].term;
    flashcardDiv.classList.remove("correct","incorrect","flipped");
}

// Flip card
flashcardDiv.addEventListener("click", () => {
    flashcardDiv.classList.toggle("flipped");
});

// Navigation buttons
document.getElementById("nextBtn").addEventListener("click", () => {
    navigateCard(1);
});
document.getElementById("prevBtn").addEventListener("click", () => {
    navigateCard(-1);
});

function navigateCard(dir){
    if(reviewWrongOnly){
        let wrongCards = incorrectIndexes.length ? incorrectIndexes : [0];
        let idx = wrongCards.indexOf(current);
        idx = (idx + dir + wrongCards.length) % wrongCards.length;
        current = wrongCards[idx];
    } else {
        current = (current + dir + flashcards.length) % flashcards.length;
    }
    flipped = false;
    flashcardDiv.classList.remove("correct","incorrect","flipped");
    showCard();
}

// Mark correct/incorrect
document.getElementById("correctBtn").addEventListener("click", () => {
    flashcardDiv.classList.add("correct");
    flashcardDiv.classList.remove("incorrect");
    if(!correctIndexes.includes(current)) correctIndexes.push(current);
});
document.getElementById("incorrectBtn").addEventListener("click", () => {
    flashcardDiv.classList.add("incorrect");
    flashcardDiv.classList.remove("correct");
    if(!incorrectIndexes.includes(current)) incorrectIndexes.push(current);
});

// Review wrong
document.getElementById("reviewWrongBtn").addEventListener("click", () => {
    reviewWrongOnly = true;
    if(incorrectIndexes.length>0) current = incorrectIndexes[0];
    showCard();
});

// Reset set
document.getElementById("resetBtn").addEventListener("click", () => {
    correctIndexes = [];
    incorrectIndexes = [];
    reviewWrongOnly = false;
    showCard();
});

// User Input section
let inputIndex = 0;
document.getElementById("inputPrevBtn").addEventListener("click", ()=>{inputIndex=(inputIndex-1+flashcards.length)%flashcards.length; updateInputTerm();});
document.getElementById("inputNextBtn").addEventListener("click", ()=>{inputIndex=(inputIndex+1)%flashcards.length; updateInputTerm();});

function updateInputTerm(){
    currentTermDiv.innerText = flashcards[inputIndex].term;
}

document.getElementById("submitInputBtn").addEventListener("click", () => {
    const userText = document.getElementById("userInput").value;
    // Placeholder: here you can send to OpenAI later
    document.getElementById("responseArea").innerText = "Submitted: " + userText + " (OpenAI response placeholder)";
    document.getElementById("userInput").value = "";
});

// Initialize
showCard();
updateInputTerm();
</script>

</body>
</html>
