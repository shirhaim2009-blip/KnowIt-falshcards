<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KnowIt Study Tool</title>

<style>
body { 
    font-family: 'Segoe UI', sans-serif; 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
    margin: 0;
}

/* 🔷 NAVBAR */
.navbar {
    display: flex;
    justify-content: center;
    background: #ffffff22;
    padding: 10px;
    gap: 10px;
}

.nav-btn {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: white;
    cursor: pointer;
    font-weight: bold;
}

.nav-btn.active {
    background: #5471c0;
    color: white;
}

/* 🔷 PAGE WRAPPER */
.page {
    display: none;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
}

.page.active {
    display: flex;
}

/* 🔷 CARD */
.container { 
    background: white; 
    padding: 2rem; 
    border-radius: 15px; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
    width: 100%; 
    max-width: 500px;
}

h2 { text-align: center; }

textarea { 
    width: 100%; 
    height: 100px; 
    margin: 10px 0; 
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button { 
    width: 100%; 
    padding: 12px; 
    background: #5471c0; 
    color: white; 
    border: none; 
    border-radius: 8px; 
    font-weight: bold;
    cursor: pointer;
}

#copyBtn { display: none; margin-top: 10px; }

#status {
    display: none;
    margin-top: 15px;
    padding: 10px;
    background: #f4f4f4;
    border-left: 5px solid #5471c0;
}
</style>
</head>

<body>

<!-- 🔷 NAVIGATION -->
<div class="navbar">
    <button class="nav-btn active" onclick="showPage('flashcards')">Flashcards</button>
    <button class="nav-btn" onclick="showPage('explain')">Explain It</button>
    <button class="nav-btn" onclick="showPage('print')">Printing</button>
</div>

<!-- 🔷 FLASHCARDS PAGE -->
<div id="flashcards" class="page active">
    <div class="container">
        <h2>Create Flashcards</h2>

        <form id="flashForm">
            <textarea placeholder="What do you want flashcards on?" required></textarea>
            <button type="submit">Generate</button>
        </form>

        <div id="status">Loading...</div>
        <button id="copyBtn">Copy Flashcard Link</button>
    </div>
</div>

<!-- 🔷 EXPLAIN PAGE -->
<div id="explain" class="page">
    <div class="container">
        <h2>Explain in Your Own Words</h2>

        <textarea id="explainInput" placeholder="Enter a concept..."></textarea>
        <button onclick="generateExplanation()">Explain</button>

        <div id="explainOutput" style="margin-top:15px;"></div>
    </div>
</div>

<!-- 🔷 PRINT PAGE -->
<div id="print" class="page">
    <div class="container">
        <h2>Print Flashcards</h2>

        <p>Click below to print your flashcards.</p>
        <button onclick="window.print()">Print</button>
    </div>
</div>

<script>

// 🔷 TAB SWITCHING
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');

    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}

// 🔷 FLASHCARD LOGIC
const form = document.getElementById('flashForm');
const statusDiv = document.getElementById('status');
const copyBtn = document.getElementById('copyBtn');

const resultLink = "https://shirhaim2009-blip.github.io/KnowIt-falshcards/";

form.addEventListener('submit', e => {
    e.preventDefault();

    statusDiv.style.display = 'block';
    statusDiv.innerText = 'Generating flashcards...';

    setTimeout(() => {
        statusDiv.innerText = 'Done! Copy your link.';
        copyBtn.style.display = 'block';
    }, 1500);
});

copyBtn.addEventListener("click", () => {
    navigator.clipboard.writeText(resultLink);
    copyBtn.innerText = "Copied!";
});

// 🔷 EXPLAIN FEATURE
function generateExplanation() {
    const input = document.getElementById("explainInput").value;
    const output = document.getElementById("explainOutput");

    if (!input) {
        output.innerText = "Please enter something.";
        return;
    }

    // simple placeholder logic (replace with API later)
    output.innerText = "In simple terms: " + input + " means breaking it down into easy-to-understand ideas.";
}

</script>

</body>
</html>
