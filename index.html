<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flashcards</title>
<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  margin:0;
  display:flex;
  height:100vh;
  overflow:hidden;
}
.menu-toggle{
  position:fixed;
  top:20px;
  left:20px;
  width:50px;
  height:50px;
  border:none;
  border-radius:50%;
  background:#5471c0;
  color:white;
  font-size:24px;
  cursor:pointer;
  z-index:1100;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.3s ease;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}
.menu-toggle.active{
  transform:scale(1.1);
  background:#405aa0;
}
.sidebar{
  position:fixed;
  top:0;
  left:-240px;
  width:240px;
  height:100%;
  background:rgba(255,255,255,0.95);
  box-shadow:2px 0 12px rgba(0,0,0,0.1);
  display:flex;
  flex-direction:column;
  padding:100px 20px 20px 20px;
  gap:10px;
  transition:left 0.5s ease, opacity 0.3s ease;
  opacity:0;
  z-index:1050;
}
.sidebar.open{
  left:0;
  opacity:1;
}
.tab-btn{
  background:none;
  border:none;
  color:#444;
  text-align:left;
  padding:12px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  display:flex;
  align-items:center;
  opacity:0;
  transform:translateX(-20px);
  transition:all 0.3s ease;
}
.sidebar.open .tab-btn{
  opacity:1;
  transform:translateX(0);
}
.tab-btn:hover{
  background:#e4e9f7;
}
.tab-btn.active{
  background:#d6def7;
  font-weight:600;
}
.main{
  flex:1;
  padding:40px;
  overflow:auto;
  margin-left:0;
  margin-top:20px;
  transition:margin-left 0.5s ease, margin-top 0.3s ease;
}
.main.shifted{
  margin-left:240px;
  margin-top:60px;
}
.tab{display:none;}
.tab.active{display:block;}
.container{
  background:white;
  padding:30px;
  border-radius:18px;
  box-shadow:0 12px 30px rgba(0,0,0,.15);
  max-width:750px;
  margin:auto;
}
.flashcard{
  width:100%;
  height:260px;
  background:#f9f9f9;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.2);
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  perspective:1000px;
  margin:30px 0;
}
.flashcard-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .6s;
}
.flashcard.flipped .flashcard-inner{
  transform:rotateY(180deg);
}
.flashcard-front,
.flashcard-back{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:28px;
  padding:30px;
  box-sizing:border-box;
  backface-visibility:hidden;
}
.flashcard-back{
  transform:rotateY(180deg);
}
.flashcard.correct{border-left:7px solid #4caf50;}
.flashcard.incorrect{border-left:7px solid #f44336;}
.buttonRow{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  justify-content:center;
}
button{
  width:140px;
  height:44px;
  border:none;
  border-radius:12px;
  background:#5471c0;
  color:white;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  transition:.2s;
}
button:hover{
  transform:translateY(-3px);
  background:#405aa0;
}
#toggleMode{
  width:auto;
  padding:0 18px;
  min-width:220px;
}
#knowledgeTitle{
  font-size:34px;
  text-align:center;
